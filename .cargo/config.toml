# Convenience aliases.
#   cargo play                              -> run the optimized (release) GUI
#   cargo prof <seed> <ticks> --profile     -> headless per-phase profiling
#   cargo sweep --param P --values a,b,c ... -> parameter sweep -> CSV (see src/bin/sweep.rs)
[alias]
play = "run --release"
prof = "run -p animata-sim --bin headless --release --"
sweep = "run -p animata-sim --bin sweep --release --"

# The sim uses macroquad's *global* RNG (srand/gen_range), so tests that seed it
# interfere when run in parallel (flaky determinism failures). Force the test
# harness single-threaded so the suite is reliable.
[env]
RUST_TEST_THREADS = "1"
