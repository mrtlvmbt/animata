# Convenience aliases.
#   cargo play          -> run the optimized (release) GUI
#   cargo prof <seed> <steps>  -> headless per-phase profiling, e.g. `cargo prof neural 1 40000`
#   cargo sweep [steps] [seeds] -> parameter sweep -> sweep.csv
[alias]
play = "run --release"
prof = "run --release --example headless --"
sweep = "run --release --example sweep --"

# The sim uses macroquad's *global* RNG (srand/gen_range), so tests that seed it
# interfere when run in parallel (flaky determinism failures). Force the test
# harness single-threaded so the suite is reliable.
[env]
RUST_TEST_THREADS = "1"
