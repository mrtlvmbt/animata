name: tests
on:
  push:
  workflow_dispatch:

# Why two jobs (see CLAUDE.md / .claude/skills/animata-sim §0 — determinism is per-arch):
#   The sim replays BIT-IDENTICALLY only within one architecture+toolchain. The state_checksum
#   goldens were pinned on the dev machine (arm64 macOS): aarch64 fuses `a*b+c` into a single FMA and
#   uses Apple's libm for cos/sin, which an x86-64 runner does NOT reproduce — so the 3 exact-golden
#   tests diverge on x86 while every threshold-based emergence corridor + same-machine replay/save-load
#   stays green there. So:
#     * test-x86 (ubuntu, fast/cheap) runs EVERYTHING EXCEPT the 3 golden-constant tests — the agent's
#       primary signal (the expensive corridors run here).
#     * golden-arm64 (macos-latest = Apple Silicon, matched arch, toolchain pinned to the dev's 1.96.0)
#       runs ONLY the 3 exact-golden locks — the bit-identity gate, on hardware that can reproduce it.
#   Both jobs emit JUnit + upload under a UNIQUE artifact name; the overall run is green iff both pass.

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      sim_relevant: ${{ steps.filter.outputs.sim_relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if sim-relevant files changed
        id: filter
        run: |
          # Get the base for comparison.
          # For PR events, use the pull request base SHA directly (more reliable on first push).
          # For push events, use the previous commit (event.before).
          # Fail-closed: if anything is missing/broken, assume sim-relevant.
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ -n "${{ github.base_ref }}" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # If BASE is missing/empty (initial commit), treat as sim-relevant
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "sim_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get list of changed files; fail-closed on git error (treat as sim-relevant)
          if ! CHANGED=$(git diff --name-only "$BASE"..HEAD 2>/dev/null); then
            echo "sim_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If diff is empty, conservative: assume sim-relevant to run tests
          if [ -z "$CHANGED" ]; then
            echo "sim_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check each file: if ALL files match render-only patterns, sim_relevant=false; else true
          # Render-only patterns: v2/crates/render/**, **.md, .claude/**, pm/**, .claude-dev-kit (exact + contents),
          # .github/workflows/sim-run.yml, .github/workflows/evo-stats.yml, etc. (but NOT tests.yml itself).
          SIM_RELEVANT=false
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            # Use case for robust pattern matching
            case "$FILE" in
              v2/crates/render/*|*.md|.claude/*|pm/*|.claude-dev-kit|.claude-dev-kit/*|.github/workflows/sim-run.yml|.github/workflows/evo-stats.yml)
                # This file is render-only, continue checking
                ;;
              *)
                # Found a sim-relevant file
                SIM_RELEVANT=true
                break
                ;;
            esac
          done <<< "$CHANGED"

          echo "sim_relevant=$SIM_RELEVANT" >> "$GITHUB_OUTPUT"

  test-x86:
    name: tests (corridors, x86)
    needs: changes
    if: needs.changes.outputs.sim_relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-x86
          workspaces: .

      # Everything except the 3 arch-bound golden-constant tests (those run on golden-arm64).
      - name: Run tests
        run: |
          cargo nextest run --profile ci --release -p animata-sim \
            -E 'not (test(state_checksum_replays_to_golden) | test(state_checksum_multicell_lock) | test(feature_toggles_bite_and_replay))'

      - name: Append summary
        if: always()
        run: |
          echo "### x86 corridors for \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          test -f target/nextest/ci/junit.xml \
            && echo '```xml' >> "$GITHUB_STEP_SUMMARY" \
            && cat target/nextest/ci/junit.xml >> "$GITHUB_STEP_SUMMARY" \
            && echo '```' >> "$GITHUB_STEP_SUMMARY" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-x86
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  golden-arm64:
    name: golden lock (arm64, matched arch)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: golden-arm64
          workspaces: .

      # ONLY the 3 exact-golden locks — they reproduce bit-for-bit only on the dev's arch (arm64).
      - name: Run golden locks
        run: |
          cargo nextest run --profile ci --release -p animata-sim \
            -E 'test(state_checksum_replays_to_golden) | test(state_checksum_multicell_lock) | test(feature_toggles_bite_and_replay)'

      - name: Append summary
        if: always()
        run: |
          echo "### arm64 golden lock for \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          test -f target/nextest/ci/junit.xml \
            && echo '```xml' >> "$GITHUB_STEP_SUMMARY" \
            && cat target/nextest/ci/junit.xml >> "$GITHUB_STEP_SUMMARY" \
            && echo '```' >> "$GITHUB_STEP_SUMMARY" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-arm64
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  # ── v2 sim (M2 — fields done right) ──────────────────────────────────────────────────────────────
  # NEW jobs INSIDE this workflow (F9 — `ci-report.sh:17` hardcodes WORKFLOW="tests.yml" and the run
  # is green iff EVERY job here is green; a separate v2-tests.yml would be invisible = false-green on
  # determinism-critical code). The v1 jobs above are untouched.
  #
  # CI-gate placement contract (F9/F10), mirrors v1's `-E` nextest filter:
  #   * the signal field is f32 → its golden is arch-bound. golden tests are named `v2_golden_*` and
  #     run ONLY on arm64 (`-E test(v2_golden)`), in release (matched arch+profile = the dev pin).
  #   * the x86 job EXCLUDES them (`-E 'not test(v2_golden)'`) — else x86 reddens on float divergence.
  #   * the R14 1-vs-N CONSERVED test (integer, a RELATIVE comparison) + two-run + energy/NaN-Inf
  #     guards sit OUTSIDE the `v2_golden_*` namespace → they run on BOTH arches, with a REAL N>1 sim
  #     thread pool (the sim builds its own pool; the test runner is orthogonal).
  #
  # Sharding (CI-2): v2-sim-x86 is split into 3 parallel shards via matrix.shard:
  #   1. x86-1: debug invariants + perf gate (fast)
  #   2. x86-2: release invariants (world, sim-core, brain)
  #   3. x86-3: release invariants (cli)
  # Each shard runs a deterministic subset. Completeness check verifies no test is missed.
  v2-sim-x86:
    name: v2 sim shard ${{ matrix.shard }} (M2, x86)
    needs: [changes, v2-shard-completeness]
    if: needs.changes.outputs.sim_relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: v2-sim-x86
          workspaces: v2

      - name: v2 shard ${{ matrix.shard }}
        run: |
          case ${{ matrix.shard }} in
            1)
              # Shard 1: debug invariants + perf gate (fast)
              cargo nextest run --workspace --locked -E 'not test(v2_golden)'
              cargo nextest run --workspace --release --locked --features perf -E 'test(work_counter)'
              ;;
            2)
              # Shard 2: release invariants (world, sim-core, brain, fields, telemetry — small crates)
              cargo nextest run -p world -p sim-core -p brain -p fields -p telemetry --release --locked -E 'not test(v2_golden)'
              ;;
            3)
              # Shard 3: release invariants (cli — large crate; work_counter runs here in release,
              # not in shard 1's perf variant which is release+perf feature)
              cargo nextest run -p cli --release --locked -E 'not test(v2_golden)'
              ;;
          esac

      - name: Append summary
        if: always()
        run: |
          echo "### v2 shard ${{ matrix.shard }} for \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          test -f target/nextest/ci/junit.xml \
            && echo '```xml' >> "$GITHUB_STEP_SUMMARY" \
            && cat target/nextest/ci/junit.xml >> "$GITHUB_STEP_SUMMARY" \
            && echo '```' >> "$GITHUB_STEP_SUMMARY" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-v2-shard-${{ matrix.shard }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  v2-shard-completeness:
    name: v2 shard coverage check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: v2-sim-x86
          workspaces: v2

      - name: Verify shard coverage is complete and deterministic
        run: bash ../../scripts/verify-shard-coverage.sh

  v2-golden-arm64:
    name: v2 golden (M2, arm64 matched arch)
    needs: changes
    if: needs.changes.outputs.sim_relevant == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: v2-golden-arm64
          workspaces: v2

      # Full suite in RELEASE on the matched arch: the `v2_golden_*` bit-for-bit lock reproduces here
      # (pinned on this arch+profile), and the integer invariants run again — so two-run-same-seed +
      # conservation are covered on arm64 too.
      - name: v2 golden + invariants (release, arm64)
        run: cargo nextest run --workspace --release --locked
