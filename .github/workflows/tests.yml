name: tests
on:
  push:
  workflow_dispatch:

# Why two jobs (see CLAUDE.md / .claude/skills/animata-sim §0 — determinism is per-arch):
#   The sim replays BIT-IDENTICALLY only within one architecture+toolchain. The state_checksum
#   goldens were pinned on the dev machine (arm64 macOS): aarch64 fuses `a*b+c` into a single FMA and
#   uses Apple's libm for cos/sin, which an x86-64 runner does NOT reproduce — so the 3 exact-golden
#   tests diverge on x86 while every threshold-based emergence corridor + same-machine replay/save-load
#   stays green there. So:
#     * test-x86 (ubuntu, fast/cheap) runs EVERYTHING EXCEPT the 3 golden-constant tests — the agent's
#       primary signal (the expensive corridors run here).
#     * golden-arm64 (macos-latest = Apple Silicon, matched arch, toolchain pinned to the dev's 1.96.0)
#       runs ONLY the 3 exact-golden locks — the bit-identity gate, on hardware that can reproduce it.
#   Both jobs emit JUnit + upload under a UNIQUE artifact name; the overall run is green iff both pass.

jobs:
  test-x86:
    name: tests (corridors, x86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Everything except the 3 arch-bound golden-constant tests (those run on golden-arm64).
      - name: Run tests
        run: |
          cargo nextest run --profile ci --release -p animata-sim \
            -E 'not (test(state_checksum_replays_to_golden) | test(state_checksum_multicell_lock) | test(feature_toggles_bite_and_replay))'

      - name: Append summary
        if: always()
        run: |
          echo "### x86 corridors for \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          test -f target/nextest/ci/junit.xml \
            && echo '```xml' >> "$GITHUB_STEP_SUMMARY" \
            && cat target/nextest/ci/junit.xml >> "$GITHUB_STEP_SUMMARY" \
            && echo '```' >> "$GITHUB_STEP_SUMMARY" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-x86
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  golden-arm64:
    name: golden lock (arm64, matched arch)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ONLY the 3 exact-golden locks — they reproduce bit-for-bit only on the dev's arch (arm64).
      - name: Run golden locks
        run: |
          cargo nextest run --profile ci --release -p animata-sim \
            -E 'test(state_checksum_replays_to_golden) | test(state_checksum_multicell_lock) | test(feature_toggles_bite_and_replay)'

      - name: Append summary
        if: always()
        run: |
          echo "### arm64 golden lock for \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          test -f target/nextest/ci/junit.xml \
            && echo '```xml' >> "$GITHUB_STEP_SUMMARY" \
            && cat target/nextest/ci/junit.xml >> "$GITHUB_STEP_SUMMARY" \
            && echo '```' >> "$GITHUB_STEP_SUMMARY" || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-arm64
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  # ── v2 sim (M2 — fields done right) ──────────────────────────────────────────────────────────────
  # NEW jobs INSIDE this workflow (F9 — `ci-report.sh:17` hardcodes WORKFLOW="tests.yml" and the run
  # is green iff EVERY job here is green; a separate v2-tests.yml would be invisible = false-green on
  # determinism-critical code). The v1 jobs above are untouched.
  #
  # CI-gate placement contract (F9/F10), mirrors v1's `-E` nextest filter:
  #   * the signal field is f32 → its golden is arch-bound. golden tests are named `v2_golden_*` and
  #     run ONLY on arm64 (`-E test(v2_golden)`), in release (matched arch+profile = the dev pin).
  #   * the x86 job EXCLUDES them (`-E 'not test(v2_golden)'`) — else x86 reddens on float divergence.
  #   * the R14 1-vs-N CONSERVED test (integer, a RELATIVE comparison) + two-run + energy/NaN-Inf
  #     guards sit OUTSIDE the `v2_golden_*` namespace → they run on BOTH arches, with a REAL N>1 sim
  #     thread pool (the sim builds its own pool; the test runner is orthogonal).
  v2-sim-x86:
    name: v2 sim (M2, x86 — invariants + R14 1-vs-N, no golden)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v2/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('v2/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v2-

      # Everything EXCEPT the arch-bound golden — the integer invariants (R14 1-vs-N conserved + its
      # negative teeth test, two-run-same-seed, exact energy conservation, NaN/Inf, bounded
      # population) + unit tests, in both profiles. The R14 test spins a real N>1 sim pool here.
      - name: v2 invariants (debug, x86)
        run: cargo nextest run --workspace --locked -E 'not test(v2_golden)'
      - name: v2 invariants (release, x86)
        run: cargo nextest run --workspace --release --locked -E 'not test(v2_golden)'

      # M4 perf-regression gate (R26 / D1b): work-counter complexity bounds (O(N) tripwire).
      # Runs ONLY here (x86, release, --features perf). NOT in v2-golden-arm64 (R19 — golden untouched).
      # Selects only work_counter tests to avoid running the full suite twice under the perf feature.
      - name: v2 perf gate (release, x86)
        run: cargo nextest run --workspace --release --locked --features perf -E 'test(work_counter)'

  v2-golden-arm64:
    name: v2 golden (M2, arm64 matched arch)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            v2/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('v2/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v2-

      # Full suite in RELEASE on the matched arch: the `v2_golden_*` bit-for-bit lock reproduces here
      # (pinned on this arch+profile), and the integer invariants run again — so two-run-same-seed +
      # conservation are covered on arm64 too.
      - name: v2 golden + invariants (release, arm64)
        run: cargo nextest run --workspace --release --locked
