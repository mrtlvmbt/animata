name: sim-run

# Manually-triggered simulation runs (NOT the test gate — that's tests.yml). These OBSERVE behaviour
# (emergence / perf / cross-seed fragility / param sweeps) on cheap cloud compute instead of taxing the
# dev machine, and upload the result (stdout summary + any CSV) as an artifact. Runs on x86 ubuntu:
# these scenarios read emergent statistics + wall-clock, they do NOT compare against the arch-bound
# golden, so the cheap runner is fine. Trigger from the Actions tab → "sim-run" → Run workflow (pick a
# scenario), or via `scripts/sim-run.sh` (which also fetches the result).
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "What to run"
        type: choice
        default: evo-stats
        options:
          - evo-stats   # headless run on one seed → emergent stats + time-series metrics.csv
          - perf        # V1 phase-timing breakdown (optionally at a forced high population)
          - v2-perf     # V2 phase-timing breakdown — builds v2-sim --features perf, requires bench_pop
          - multiseed   # the same run across seeds 1..5 → cross-seed emergence (fragility probe)
          - sweep       # vary one Params field across a value grid (× seeds) SERIALLY in one job → CSV
          - gridsweep   # same grid as sweep but FANNED across a job matrix (one runner per value) → parallel
          - dprime-2c   # D′-2c verdict: PLASTIC (reg_gain_max=4) vs CONSTITUTIVE (reg_gain_max=0), 5 seeds
          - dprime-3b   # D′-3b emergence verdict: Guild::Phototroph fraction in dprime mineral economy
          - driver-emergence  # D-3b verdict: multicellularity under predation size-refuge (refuge_k sweep)
          - hypoxia-verdict   # P1-2b verdict: O₂-diffusion hypoxia grounds settling (WITH vs ablation, size-shrink)
          - settling-verdict     # P4/SL-3 verdict: settling mechanic produces emergent stable size intermediate (WITH vs ablation)
          - dol-verdict          # DL-V (#343) verdict: division-of-labor robustness (4 arms: D-5 baseline / DOL-full / DOL-refuge / ablation)
          - composition-verdict   # DL-C (#345) verdict: composition of D-5 + settling + O₂ + DOL (3 arms: D-5 / kitchensink / ablation)
          - dr0-diag            # DR-0 (#347) economy-coupled bootstrapping diagnostic (founder survival + soma growth)
          - dr0-gradient        # DR-0b (#349) resource-gradient diagnostic (scarcity sweep: u_max factor × seeds)
          - ga-load              # GA-LOAD-0 (#354) ratchet diagnostic (f_del sweep via del_den × burden_cost_k × seeds)
          - dc-diag             # DC-DIAG (#351) size-ceiling diagnostic (cap-bound vs driver-bound: base_hazard sweep, max_body_size)
          - d5-drift            # D5-DRIFT (#374) pre-registered diagnostic (drift across plateau vs selection on gradient: refuge_k × base_hazard grid)
          - env-frontier         # ENV-0a'-a2 (#362) mutual-invasibility harness (patch-grain sweep, coexistence domain)
          - ext-0a               # EXT-0a (#377) footprint harvest diagnostic (density-dependent body-size income, contention)
          - ext-0b               # EXT-0b (#385) sweep harness parameterizing footprint arm by gdev_cap/morphogen_steps
          - diff-probe           # DIFF-0 (#372) cell-type differentiation probe (T>=2 ever occur under stock driver_config?)
          - topo-diff            # TOPO-DIFF Rung 0 (#391) imposed-split verdict (PEAK vs PLATEAU classification)
      seed:
        description: "World seed (evo-stats / perf)"
        default: "1"
      ticks:
        description: "Ticks to run"
        default: "8000"
      gdev_cap:
        description: "ext-0b — morphogen gdev cap (default 4)"
        default: "4"
      morphogen_steps:
        description: "ext-0b — morphogen steps (default 8)"
        default: "8"
      bench_pop:
        description: "perf / v2-perf — pre-stuff N founders to time step() at scale (e.g. 5000); blank = natural pop"
        default: ""
      param:
        description: "sweep / gridsweep — Params field to vary (e.g. photo_rate, toxin_lethality)"
        default: ""
      values:
        description: "sweep / gridsweep — comma-separated values for --param (e.g. 0.0,0.5,1.0)"
        default: ""
      seeds:
        description: "sweep / gridsweep — comma-separated seeds (e.g. 1,2,3)"
        default: "1"
      force:
        description: "sweep: override the 64-cell grid cap; gridsweep: override the 24-value matrix cap"
        type: boolean
        default: false
      run_nonce:
        description: "internal — correlation nonce set by scripts/sim-run.sh (leave blank in the UI)"
        default: ""

# Nonce in the run title so scripts/sim-run.sh can grep its own dispatch (clock-independent).
run-name: sim-run ${{ inputs.scenario }} [${{ inputs.run_nonce }}]

jobs:
  # ── Scenarios that run in ONE job (evo-stats / perf / multiseed / serial sweep) ────────────────────
  run:
    if: inputs.scenario != 'gridsweep'
    # Label: the single seed is meaningless for a multi-seed sweep, so show the swept param there instead.
    name: ${{ inputs.scenario }} (${{ inputs.scenario == 'sweep' && format('grid {0}', inputs.param) || format('seed {0}', inputs.seed) }}, ${{ inputs.ticks }} ticks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            v2/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Build the V1 headless binary (all scenarios except v2-perf and dprime-2c/dprime-3b/driver-emergence).
      - name: Build headless (V1)
        if: inputs.scenario != 'v2-perf' && inputs.scenario != 'dprime-2c' && inputs.scenario != 'dprime-3b' && inputs.scenario != 'driver-emergence'
        run: cargo build -p animata-sim --bin headless --release

      # Build the V2 binary with the perf feature (v2-perf only). v2/ is a STANDALONE workspace;
      # `cargo build -p cli` from the root workspace fails — must cd into v2/.
      - name: Build v2-sim --features perf (V2)
        if: inputs.scenario == 'v2-perf'
        run: cd v2 && cargo build --bin v2-sim --release --features perf

      # D′-2c/D′-3b/D-3b driver-emergence: pre-compile the cli test suite (fast subsequent
      # `cargo test --no-run` → compile only). The verdict tests are #[ignore] so they never run in
      # CI; these scenarios invoke them explicitly.
      - name: Build v2 cli tests for dprime-2c / dprime-3b / driver-emergence / hypoxia-verdict / settling-verdict / dol-verdict / composition-verdict / dr0-diag / dr0-gradient / ga-load / dc-diag / d5-drift / ext-0a / ext-0b / diff-probe / topo-diff
        if: inputs.scenario == 'dprime-2c' || inputs.scenario == 'dprime-3b' || inputs.scenario == 'driver-emergence' || inputs.scenario == 'hypoxia-verdict' || inputs.scenario == 'settling-verdict' || inputs.scenario == 'dol-verdict' || inputs.scenario == 'composition-verdict' || inputs.scenario == 'dr0-diag' || inputs.scenario == 'dr0-gradient' || inputs.scenario == 'ga-load' || inputs.scenario == 'dc-diag' || inputs.scenario == 'd5-drift' || inputs.scenario == 'ext-0a' || inputs.scenario == 'ext-0b' || inputs.scenario == 'diff-probe' || inputs.scenario == 'topo-diff'
        run: cd v2 && cargo test --release -p cli --no-run

      - name: Run scenario
        run: |
          set -euo pipefail
          BIN=target/release/headless
          V2BIN=v2/target/release/v2-sim
          mkdir -p sim-out
          SUM=sim-out/summary.txt
          case "${{ inputs.scenario }}" in
            evo-stats)
              "$BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --metrics sim-out/metrics.csv | tee "$SUM"
              ;;
            perf)
              if [ -n "${{ inputs.bench_pop }}" ]; then
                "$BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --bench-pop "${{ inputs.bench_pop }}" --profile | tee "$SUM"
              else
                "$BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --profile | tee "$SUM"
              fi
              ;;
            v2-perf)
              # Run the v2 bench scenario: v2-sim [seed [ticks]] [--bench-pop N] --profile
              # seed / ticks as positional args, bench_pop optional (blank → natural founders).
              BP="${{ inputs.bench_pop }}"
              if [ -n "$BP" ]; then
                "$V2BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --bench-pop "$BP" --profile 2>&1 | tee "$SUM"
              else
                "$V2BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --profile 2>&1 | tee "$SUM"
              fi
              # Guard: the per-stage table only appears when built with --features perf.
              # If that flag was forgotten, --profile prints only a stderr warning and exits 0 —
              # a silent empty result would look green. Fail loud instead.
              grep -q 'ns/ent' "$SUM" \
                || { echo "FAIL: per-stage breakdown absent from output (--features perf missing?)" | tee -a "$SUM"; exit 1; }
              ;;
            multiseed)
              : > "$SUM"
              for s in 1 2 3 4 5; do
                echo "===== seed $s =====" | tee -a "$SUM"
                "$BIN" "$s" "${{ inputs.ticks }}" | tee -a "$SUM"
                echo | tee -a "$SUM"
              done
              ;;
            dprime-2c)
              # D′-2c verdict: PLASTIC (reg_gain_max=4) vs CONSTITUTIVE (reg_gain_max=0), 5 seeds.
              # Pre-declared margin: PLASTIC mean N̄ > CONSTITUTIVE mean N̄ by ≥5%, sign in ≥4/5 seeds.
              # Runs the #[ignore] test with DPRIME_TICKS override; --nocapture prints per-seed numbers.
              cd v2
              DPRIME_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- dprime_2c_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            dprime-3b)
              # D′-3b emergence verdict: Guild::Phototroph fraction in dprime mineral economy.
              # Pre-declared: signal=photo_in/(photo_in+chem_in), threshold=>50%, PROD_FRAC=10%,
              # 5 seeds, EMERGES if ≥3/5 seeds exceed PROD_FRAC at the ticks-horizon.
              cd v2
              DPRIME_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- dprime_3b_emergence_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            driver-emergence)
              # D-3b (#274) emergence verdict: does multicellular body size emerge under predation
              # size-refuge (Boraas/Ratcliff) and revert without it? Pre-declared: EMERGENCE iff a
              # refuge_k in {2,8,32,128} sustains multicellular_frac ≥50% AND ≥2x both the
              # predator-ablation and channel-isolation controls, in ≥3/5 seeds.
              cd v2
              DRIVER_EMERGENCE_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- driver_emergence_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            hypoxia-verdict)
              # P1-2b (#306) faithful-verdict: does the O₂-diffusion hypoxia cost GROUND settling —
              # selectively suppress LARGER multicellular bodies (crit. c) rather than being a size-knob?
              # WITH vs ABLATION (ablate_hypoxia) on the calibrated phase2_oxygen_config (hypoxia_base=543,
              # Ratcliffe −10%). Pre-declared: WITH mean body size < ABLATION by ≥5% in ≥3/5 seeds → FAITHFUL.
              # HYPOXIA_BASE_X1000 env can override the calibration for a sweep.
              cd v2
              HYPOXIA_VERDICT_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- hypoxia_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            settling-verdict)
              # P4/SL-3 (#327) faithful-verdict: does the settling mechanic produce an emergent STABLE
              # size intermediate that is reversible, persistent, and costed? WITH vs ABLATION (settling=None)
              # on the settling_config (SL-2 static-O₂ deficit, evolve_body_size, g_dev=1 unicellular founder).
              # Pre-declared (a/d) reversible: WITH mean body size > ABLATION by ≥5% in ≥3/5 seeds.
              # Pre-declared (b) intermediate: WITH shows evolved equilibrium (>1, <INTERMEDIATE_CEIL, drift<DRIFT_EPS).
              cd v2
              SETTLING_VERDICT_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- settling_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            dol-verdict)
              # DL-V (#343) robustness verdict: does division-of-labor make the Phase-2 multicellular
              # transition ROBUST (vs D-5's marginal ~60%)? Four arms: D-5 baseline / DOL-full /
              # DOL-refuge-only (soma-refuge on, germ-repro off) / ablation (no predators).
              # Verdict logic: (a) DOL-full passes D-5 gates (frac≥50% AND ≥2x ablation),
              # (b) DOL-full > DOL-refuge-only (germ-repro trade-off load-bearing),
              # (c) germ:soma intermediate non-degenerate (modal_germ≥2, not germ=1 pinning).
              cd v2
              DOL_VERDICT_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- driver_dol_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            composition-verdict)
              # DL-C (#345) composition verdict: does the ECOLOGY of D-5 hazard-refuge + settling +
              # O₂-hypoxia + DOL compose to a robust multicellular transition? Three arms: D-5 baseline /
              # kitchensink (all mechanics ON) / ablation (no predators). Verdict logic: (a) kitchensink
              # passes emergence gates (frac≥50% AND ≥2x ablation), (b) germ:soma intermediate non-degenerate
              # (modal_germ≥2, soma appears, not germ=1 pinning). EMPIRICAL: no pre-declared hard robustness
              # number beyond a/b gates — NULL is an honest result (composition insufficient).
              cd v2
              DLC_VERDICT_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- kitchensink_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            dr0-diag)
              # DR-0 (#347) economy-coupled bootstrapping diagnostic: does the redesigned economy-coupled
              # mechanic (income∝soma, germ=flat fertility) bootstrap multi-soma bodies from a unicellular
              # founder under the D-5 hazard economy? Tests founder survival (≥3/5 seeds) and soma growth
              # (mean soma≥2 with germ-minority, multicellular_frac≥baseline).
              cd v2
              DR0_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- dr0_bootstrap_diag --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            dr0-gradient)
              # DR-0b (#349) resource-gradient diagnostic: does soma-majority emerge under increasing
              # resource scarcity? Sweeps u_max factor [25,50,100,200,400]% across seeds 1..5 and compares
              # soma:germ ratios to identify the scarcity threshold where multicellularity preference changes.
              cd v2
              DR0B_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- dr0_resource_gradient --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            ga-load)
              # GA-LOAD-0 (#354) ratchet diagnostic: deleterious-mutation load substrate.
              # Clonal population sweeps f_del (via mut_load_del_den [8,16,32,64]) ×
              # burden_cost_k [1,2,4] × seeds [1,2,3]. Emits descriptive MAP per cell
              # (no PASS/FAIL); analysis is offline. Checks: run to horizon, load>=0, pop>=0.
              cd v2
              GA_LOAD_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- ga_load_ratchet --nocapture --ignored 2>&1 | tee ../$SUM
              ;;
            dc-diag)
              # DC-DIAG (#351) size-ceiling diagnostic: is body size cap-bound (g_dev≤4→16 cells) or
              # driver-bound (weak size selection)? Sweeps base_hazard [10,30,100,300,1000] × seeds 1..5
              # on driver_config (D-5 hazard-refuge, strongest size-driver) and reports mean/max_body_size.
              # Decisive: max_body_size ≤~8 across all levels → cap not binding → precondition-NULL.
              cd v2
              DC_DIAG_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- dc_diag_size_ceiling --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            d5-drift)
              # D5-DRIFT (#374) pre-registered diagnostic: is D-5's ~60% multicellularity drift across
              # a neutral plateau, or selection on a gradient? Arm A: refuge_k×base_hazard grid
              # (k={2,32,128} × base={10,20,40} × seeds 1..8, ticks 8000). Arm B: founder control
              # (g_dev={1,2} × base={10,20} × seeds 1..8, k=128 fixed). Pre-declared predictions pinned
              # in test code. Diagnostic: reports mean/max body size + histogram per cell; no PASS/FAIL verdict.
              cd v2
              D5_DRIFT_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- d5_drift_arm_a --nocapture --ignored 2>&1 | tee ../"$SUM"
              D5_DRIFT_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- d5_drift_arm_b --nocapture --ignored 2>&1 | tee -a ../"$SUM"
              ;;
            env-frontier)
              # ENV-0a'-a2' (#367) re-instrumented harness: TWO #[ignore] sweeps over patch_grain
              # {1,2,4,8,16,32} × seeds {1,2,3} at ENV_FRONTIER_TICKS. (a) emergence sweep — %-multicellular
              # from a unicellular EVOLVING start, retention-OFF vs -ON (the real-goal metric);
              # (b) invasion sweep — true-rarity (2 fixed invaders) reciprocal invasibility via species_census.
              # Filter `env0a_a2p` matches BOTH sweeps. Emits greppable `ENV-0a-a2p emergence|invasion ...`
              # MAP lines. Analysis offline; no in-code verdict. Checks: run to horizon, counts ≥ 0.
              cd v2
              ENV_FRONTIER_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- env0a_a2p --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            ext-0a)
              # EXT-0a (#377) footprint harvest diagnostic: does non-lethal body-size income gradient emerge
              # from spatial footprint harvest and between-body contention? Arm A: footprint ON, density
              # sweep {0.02, 0.05, 0.10} agents/cell, seeds 1..8. Arm B: footprint OFF (baseline, should
              # show no density-dependent N* shift). Conservation check: R15 residual==0 with footprint ON.
              # Emits greppable `EXT-0a_a density=... seed=... ...` (Arm A) and `EXT-0a_b` (Arm B) MAP lines.
              # Analyzes: reads table per (density, seed), checks (a) direction (N* != cap at high density),
              # (b) density monotonicity (N* shrinks as density rises), (c) contention rate correlation.
              cd v2
              EXT0A_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- ext0a_footprint_arm_a --nocapture --ignored 2>&1 | tee ../"$SUM"
              EXT0A_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- ext0a_footprint_arm_b_control --nocapture --ignored 2>&1 | tee -a ../"$SUM"
              EXT0A_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- ext0a_footprint_conservation --nocapture 2>&1 | tee -a ../"$SUM"
              ;;
            ext-0b)
              # EXT-0b (#385) sweep harness: parameterize footprint arm by gdev_cap/morphogen_steps.
              # Same density sweep and structure as Arm A, but allows raised morphogen cap to test saturation
              # (cap-bound vs emergent optimum). Runs Arm A with EXT0B_GDEV_CAP and EXT0B_MORPH_STEPS overrides.
              # Pass-2 of EXT-0b (sweep harness); pass-1 merged config knobs (#383).
              cd v2
              EXT0A_TICKS="${{ inputs.ticks }}" EXT0B_GDEV_CAP="${{ inputs.gdev_cap }}" EXT0B_MORPH_STEPS="${{ inputs.morphogen_steps }}" \
                cargo test --release -p cli -- ext0a_footprint_arm_a --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            diff-probe)
              # DIFF-0 (#372) cell-type differentiation substrate probe: does T≥2 (distinct cell types)
              # ever occur under stock driver_config? Seeds 1..8, horizon DIFF0_TICKS. Measures joint (T,N)
              # histogram, input_weights drift, and first T≥2 observation. Prior: input_weights=[0,0] (drive
              # dead) → every cell same GRN attractor → T==1 always (NULL expectation).
              # Emits greppable DIFF0 hist/stats MAP lines. Analysis offline; no in-code verdict.
              cd v2
              DIFF0_TICKS="${{ inputs.ticks }}" \
                cargo test --release -p cli -- diff0_type_probe --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            topo-diff)
              # TOPO-DIFF Rung 0 (#391) imposed-split verdict: does fate-keyed germ/soma DoL
              # pay under the D-5⊕ENV-0a′ economy? Hand-builds matched-N bodies with imposed splits
              # (0:N to N:0 germ:soma ratios), runs through economy stages, measures group fitness curve.
              # Pre-declared PASS: interior maximum (PEAK — strict max > neighbors on both sides, concave).
              # Pre-declared NULL: flat interior (PLATEAU) or edge/monotone maximum (no interior optimum).
              # Verdict: ≥2/3 seeds showing PEAK at all test sizes → Rung 0 PASS (proceed to Rung 1).
              cd v2
              cargo test --release -p cli -- topo_diff_rung0_imposed_split_verdict --nocapture --ignored 2>&1 | tee ../"$SUM"
              ;;
            sweep)
              cargo build -p animata-sim --bin sweep --release
              FORCE=""
              if [ "${{ inputs.force }}" = "true" ]; then FORCE="--force"; fi
              target/release/sweep --param "${{ inputs.param }}" --values "${{ inputs.values }}" \
                --seeds "${{ inputs.seeds }}" --ticks "${{ inputs.ticks }}" $FORCE --out sim-out/sweep.csv | tee "$SUM"
              ;;
            *)
              echo "unknown scenario: ${{ inputs.scenario }}" | tee "$SUM"; exit 2 ;;
          esac

      - name: Append summary
        if: always()
        run: |
          LABEL='${{ inputs.scenario == 'sweep' && format('grid {0}', inputs.param) || format('seed {0}', inputs.seed) }}'
          echo "### sim-run: ${{ inputs.scenario }} — $LABEL, ${{ inputs.ticks }} ticks (\`${GITHUB_SHA::8}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat sim-out/summary.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no output)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sim-run-${{ inputs.scenario }}
          path: sim-out/
          if-no-files-found: warn

  # ── gridsweep: the SAME single-param grid as `sweep`, but each value runs on its OWN runner ─────────
  # Concurrently (a job matrix) instead of serially in one job — so a wide value grid finishes in ~1×
  # per-cell wallclock instead of N×. Still OBSERVATIONAL and off the golden path: every cell shells out
  # to the SAME `sweep` bin with a single `--values <v>`, so this shares sweep's zero-determinism story
  # (each cell builds a non-default SimConfig) and writes NO golden constant. The grid is fanned by value
  # (× all seeds per cell) — the cheap axis to parallelise, since worldgen is paid once per seed per cell.
  grid-setup:
    if: inputs.scenario == 'gridsweep'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Build value matrix from --values
        id: gen
        run: |
          set -euo pipefail
          PARAM='${{ inputs.param }}'
          [ -n "$PARAM" ] || { echo "gridsweep: --param is required"; exit 2; }
          # "0.0, 0.5 ,1.0" → trimmed, blank-stripped JSON array ["0.0","0.5","1.0"] for fromJSON below.
          JSON="$(printf '%s' '${{ inputs.values }}' \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//; /^$/d' \
            | jq -R . | jq -cs .)"
          N="$(printf '%s' "$JSON" | jq 'length')"
          [ "$N" -gt 0 ] || { echo "gridsweep: --values produced an empty grid"; exit 2; }
          # Cap the matrix WIDTH (one runner per value) — GitHub allows ≤256 matrix jobs; keep wide sweeps
          # deliberate. `force` lifts it (mirrors sweep's CELL_CAP override), still bounded by the 256 hard cap.
          if [ "$N" -gt 24 ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "gridsweep: $N values > matrix cap 24; pass force=true to override (≤256 hard cap)"; exit 2
          fi
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "gridsweep: $N parallel cells (param=$PARAM) → $JSON"

  grid-cell:
    if: inputs.scenario == 'gridsweep'
    needs: grid-setup
    name: gridsweep ${{ inputs.param }}=${{ matrix.value }} (seeds ${{ inputs.seeds }}, ${{ inputs.ticks }} ticks)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one bad value must not cancel the rest of the grid
      matrix:
        value: ${{ fromJSON(needs.grid-setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build sweep
        run: cargo build -p animata-sim --bin sweep --release

      - name: Run one grid cell
        run: |
          set -euo pipefail
          mkdir -p sim-out
          V='${{ matrix.value }}'
          # One value, all seeds → this cell's rows of the same CSV schema `sweep` emits.
          target/release/sweep --param '${{ inputs.param }}' --values "$V" \
            --seeds '${{ inputs.seeds }}' --ticks '${{ inputs.ticks }}' \
            --out "sim-out/sweep-${V}.csv" | tee "sim-out/summary.txt"

      - name: Append summary
        if: always()
        run: |
          echo "### gridsweep cell: ${{ inputs.param }}=${{ matrix.value }} — seeds ${{ inputs.seeds }}, ${{ inputs.ticks }} ticks (\`${GITHUB_SHA::8}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat sim-out/summary.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no output)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          # Unique per cell (upload-artifact@v4 rejects duplicate names); `value` is sanitised for the path.
          name: sim-run-gridsweep-${{ strategy.job-index }}-${{ matrix.value }}
          path: sim-out/
          if-no-files-found: warn
