name: sim-run

# Manually-triggered simulation runs (NOT the test gate ‚Äî that's tests.yml). These OBSERVE behaviour
# (emergence / perf / cross-seed fragility / param sweeps) on cheap cloud compute instead of taxing the
# dev machine, and upload the result (stdout summary + any CSV) as an artifact. Runs on x86 ubuntu:
# these scenarios read emergent statistics + wall-clock, they do NOT compare against the arch-bound
# golden, so the cheap runner is fine. Trigger from the Actions tab ‚Üí "sim-run" ‚Üí Run workflow (pick a
# scenario), or via `scripts/sim-run.sh` (which also fetches the result).
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "What to run"
        type: choice
        default: evo-stats
        options:
          - evo-stats   # headless run on one seed ‚Üí emergent stats + time-series metrics.csv
          - perf        # V1 phase-timing breakdown (optionally at a forced high population)
          - v2-perf     # V2 phase-timing breakdown ‚Äî builds v2-sim --features perf, requires bench_pop
          - multiseed   # the same run across seeds 1..5 ‚Üí cross-seed emergence (fragility probe)
          - sweep       # vary one Params field across a value grid (√ó seeds) SERIALLY in one job ‚Üí CSV
          - gridsweep   # same grid as sweep but FANNED across a job matrix (one runner per value) ‚Üí parallel
      seed:
        description: "World seed (evo-stats / perf)"
        default: "1"
      ticks:
        description: "Ticks to run"
        default: "8000"
      bench_pop:
        description: "perf / v2-perf ‚Äî pre-stuff N founders to time step() at scale (e.g. 5000); blank = natural pop"
        default: ""
      param:
        description: "sweep / gridsweep ‚Äî Params field to vary (e.g. photo_rate, toxin_lethality)"
        default: ""
      values:
        description: "sweep / gridsweep ‚Äî comma-separated values for --param (e.g. 0.0,0.5,1.0)"
        default: ""
      seeds:
        description: "sweep / gridsweep ‚Äî comma-separated seeds (e.g. 1,2,3)"
        default: "1"
      force:
        description: "sweep: override the 64-cell grid cap; gridsweep: override the 24-value matrix cap"
        type: boolean
        default: false
      run_nonce:
        description: "internal ‚Äî correlation nonce set by scripts/sim-run.sh (leave blank in the UI)"
        default: ""

# Nonce in the run title so scripts/sim-run.sh can grep its own dispatch (clock-independent).
run-name: sim-run ${{ inputs.scenario }} [${{ inputs.run_nonce }}]

jobs:
  # ‚îÄ‚îÄ Scenarios that run in ONE job (evo-stats / perf / multiseed / serial sweep) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  run:
    if: inputs.scenario != 'gridsweep'
    # Label: the single seed is meaningless for a multi-seed sweep, so show the swept param there instead.
    name: ${{ inputs.scenario }} (${{ inputs.scenario == 'sweep' && format('grid {0}', inputs.param) || format('seed {0}', inputs.seed) }}, ${{ inputs.ticks }} ticks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            v2/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Build the V1 headless binary (all scenarios except v2-perf).
      - name: Build headless (V1)
        if: inputs.scenario != 'v2-perf'
        run: cargo build -p animata-sim --bin headless --release

      # Build the V2 binary with the perf feature (v2-perf only). v2/ is a STANDALONE workspace;
      # `cargo build -p cli` from the root workspace fails ‚Äî must cd into v2/.
      - name: Build v2-sim --features perf (V2)
        if: inputs.scenario == 'v2-perf'
        run: cd v2 && cargo build --bin v2-sim --release --features perf

      - name: Run scenario
        run: |
          set -euo pipefail
          BIN=target/release/headless
          V2BIN=v2/target/release/v2-sim
          mkdir -p sim-out
          SUM=sim-out/summary.txt
          case "${{ inputs.scenario }}" in
            evo-stats)
              "$BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --metrics sim-out/metrics.csv | tee "$SUM"
              ;;
            perf)
              if [ -n "${{ inputs.bench_pop }}" ]; then
                "$BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --bench-pop "${{ inputs.bench_pop }}" --profile | tee "$SUM"
              else
                "$BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --profile | tee "$SUM"
              fi
              ;;
            v2-perf)
              # Run the v2 bench scenario: v2-sim [seed [ticks]] [--bench-pop N] --profile
              # seed / ticks as positional args, bench_pop optional (blank ‚Üí natural founders).
              BP="${{ inputs.bench_pop }}"
              if [ -n "$BP" ]; then
                "$V2BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --bench-pop "$BP" --profile 2>&1 | tee "$SUM"
              else
                "$V2BIN" "${{ inputs.seed }}" "${{ inputs.ticks }}" --profile 2>&1 | tee "$SUM"
              fi
              # Guard: the per-stage table only appears when built with --features perf.
              # If that flag was forgotten, --profile prints only a stderr warning and exits 0 ‚Äî
              # a silent empty result would look green. Fail loud instead.
              grep -q 'ns/ent' "$SUM" \
                || { echo "FAIL: per-stage breakdown absent from output (--features perf missing?)" | tee -a "$SUM"; exit 1; }
              ;;
            multiseed)
              : > "$SUM"
              for s in 1 2 3 4 5; do
                echo "===== seed $s =====" | tee -a "$SUM"
                "$BIN" "$s" "${{ inputs.ticks }}" | tee -a "$SUM"
                echo | tee -a "$SUM"
              done
              ;;
            sweep)
              cargo build -p animata-sim --bin sweep --release
              FORCE=""
              if [ "${{ inputs.force }}" = "true" ]; then FORCE="--force"; fi
              target/release/sweep --param "${{ inputs.param }}" --values "${{ inputs.values }}" \
                --seeds "${{ inputs.seeds }}" --ticks "${{ inputs.ticks }}" $FORCE --out sim-out/sweep.csv | tee "$SUM"
              ;;
            *)
              echo "unknown scenario: ${{ inputs.scenario }}" | tee "$SUM"; exit 2 ;;
          esac

      - name: Append summary
        if: always()
        run: |
          LABEL='${{ inputs.scenario == 'sweep' && format('grid {0}', inputs.param) || format('seed {0}', inputs.seed) }}'
          echo "### sim-run: ${{ inputs.scenario }} ‚Äî $LABEL, ${{ inputs.ticks }} ticks (\`${GITHUB_SHA::8}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat sim-out/summary.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no output)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sim-run-${{ inputs.scenario }}
          path: sim-out/
          if-no-files-found: warn

  # ‚îÄ‚îÄ gridsweep: the SAME single-param grid as `sweep`, but each value runs on its OWN runner ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Concurrently (a job matrix) instead of serially in one job ‚Äî so a wide value grid finishes in ~1√ó
  # per-cell wallclock instead of N√ó. Still OBSERVATIONAL and off the golden path: every cell shells out
  # to the SAME `sweep` bin with a single `--values <v>`, so this shares sweep's zero-determinism story
  # (each cell builds a non-default SimConfig) and writes NO golden constant. The grid is fanned by value
  # (√ó all seeds per cell) ‚Äî the cheap axis to parallelise, since worldgen is paid once per seed per cell.
  grid-setup:
    if: inputs.scenario == 'gridsweep'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Build value matrix from --values
        id: gen
        run: |
          set -euo pipefail
          PARAM='${{ inputs.param }}'
          [ -n "$PARAM" ] || { echo "gridsweep: --param is required"; exit 2; }
          # "0.0, 0.5 ,1.0" ‚Üí trimmed, blank-stripped JSON array ["0.0","0.5","1.0"] for fromJSON below.
          JSON="$(printf '%s' '${{ inputs.values }}' \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//; /^$/d' \
            | jq -R . | jq -cs .)"
          N="$(printf '%s' "$JSON" | jq 'length')"
          [ "$N" -gt 0 ] || { echo "gridsweep: --values produced an empty grid"; exit 2; }
          # Cap the matrix WIDTH (one runner per value) ‚Äî GitHub allows ‚â§256 matrix jobs; keep wide sweeps
          # deliberate. `force` lifts it (mirrors sweep's CELL_CAP override), still bounded by the 256 hard cap.
          if [ "$N" -gt 24 ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "gridsweep: $N values > matrix cap 24; pass force=true to override (‚â§256 hard cap)"; exit 2
          fi
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "gridsweep: $N parallel cells (param=$PARAM) ‚Üí $JSON"

  grid-cell:
    if: inputs.scenario == 'gridsweep'
    needs: grid-setup
    name: gridsweep ${{ inputs.param }}=${{ matrix.value }} (seeds ${{ inputs.seeds }}, ${{ inputs.ticks }} ticks)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one bad value must not cancel the rest of the grid
      matrix:
        value: ${{ fromJSON(needs.grid-setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build sweep
        run: cargo build -p animata-sim --bin sweep --release

      - name: Run one grid cell
        run: |
          set -euo pipefail
          mkdir -p sim-out
          V='${{ matrix.value }}'
          # One value, all seeds ‚Üí this cell's rows of the same CSV schema `sweep` emits.
          target/release/sweep --param '${{ inputs.param }}' --values "$V" \
            --seeds '${{ inputs.seeds }}' --ticks '${{ inputs.ticks }}' \
            --out "sim-out/sweep-${V}.csv" | tee "sim-out/summary.txt"

      - name: Append summary
        if: always()
        run: |
          echo "### gridsweep cell: ${{ inputs.param }}=${{ matrix.value }} ‚Äî seeds ${{ inputs.seeds }}, ${{ inputs.ticks }} ticks (\`${GITHUB_SHA::8}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat sim-out/summary.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(no output)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          # Unique per cell (upload-artifact@v4 rejects duplicate names); `value` is sanitised for the path.
          name: sim-run-gridsweep-${{ strategy.job-index }}-${{ matrix.value }}
          path: sim-out/
          if-no-files-found: warn
