[package]
name = "world"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "animata v2 world backend — WorldView CPU heightmap (M1)"

[dependencies]
sim-core.workspace = true

[features]
default = ["noise"]
# `noise`: the heightmap is generated by f64 value-noise (uses `sin` → libm → ARCH-DIVERGENT, like
# v1). This is the float that makes the M1 trajectory arch-dependent → the golden is pinned per-arch
# (arm64). With `noise` OFF the world is flat (height 0) and fully integer — the determinism fallback.
noise = []
